<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin | El Padrino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.datatables.net/2.0.3/css/dataTables.dataTables.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* ══════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════ */
:root{
  --ink:#0c0a07;--ink2:#131009;--ink3:#1b1610;--ink4:#221c14;
  --red:#8b1a1a;--red2:#b52020;--red3:#d42828;
  --gold:#b8860b;--gold2:#d4a017;--gold3:#e8c04a;
  --green:#166534;--green2:#22c55e;
  --cream:#e6dcc8;--muted:#8a7a62;--dim:#554535;--dimmer:#3a2e1e;
  --border:rgba(139,26,26,.22);--bord-g:rgba(212,160,23,.14);
  --sw:240px;--th:58px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:0 8px 48px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Source Sans 3',sans-serif;background:var(--ink);color:var(--cream)}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--ink2)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--th);z-index:600;
  background:rgba(13,10,7,.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.2rem;
}
.tb-left{display:flex;align-items:center;gap:.85rem}
.tb-brand{font-family:'Oswald',sans-serif;font-size:1.18rem;font-weight:700;color:var(--gold2);letter-spacing:.1em;display:flex;align-items:center;gap:.45rem}
.tb-brand svg{flex-shrink:0}
.hamburger{display:none;background:none;border:none;color:var(--gold2);font-size:1.4rem;padding:.15rem .35rem;border-radius:5px;transition:background .18s}
.hamburger:hover{background:rgba(212,160,23,.1)}
.tb-right{display:flex;align-items:center;gap:.6rem}
.tb-pill{display:flex;align-items:center;gap:.35rem;background:var(--ink3);border:1px solid var(--bord-g);border-radius:20px;padding:.28rem .75rem .28rem .45rem;font-size:.82rem;color:var(--muted)}
.tb-pill i{color:var(--gold2);font-size:.78rem}
.tb-pill strong{color:var(--cream)}
.btn-logout{font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:.07em;padding:.32rem .85rem;border-radius:5px;background:rgba(139,26,26,.2);color:#f87171;border:1px solid rgba(139,26,26,.3);display:flex;align-items:center;gap:.3rem;transition:all .18s}
.btn-logout:hover{background:var(--red);color:#fff}

/* REALTIME DOT */
.rt-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:rt-pulse 2s infinite;flex-shrink:0}
@keyframes rt-pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 6px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.rt-label{font-size:.7rem;color:var(--muted)}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.layout{display:flex;padding-top:var(--th);height:100vh}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(2px)}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--ink2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:510;
}
.sb-profile{padding:1.1rem 1rem .85rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.7rem}
.sb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(212,160,23,.25)}
.sb-name{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:600;color:#fff}
.sb-role{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:.05rem}
.sb-sec{padding:.85rem 1.1rem .25rem;font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--dimmer)}
.nav-item{
  display:flex;align-items:center;gap:.65rem;
  width:calc(100% - .9rem);margin:.08rem .45rem;
  padding:.58rem .85rem;border-radius:7px;
  background:transparent;border:1px solid transparent;
  color:var(--cream);font-size:.9rem;transition:all .16s;text-align:left;
}
.nav-item i{font-size:.9rem;color:var(--gold);flex-shrink:0;width:16px;text-align:center}
.nav-item:hover{background:rgba(212,160,23,.07);border-color:var(--bord-g);color:#fff}
.nav-item.active{background:rgba(139,26,26,.25);border-color:var(--border);color:var(--gold2)}
.nav-item.active i{color:var(--gold2)}
.sb-badge{background:var(--red2);color:#fff;border-radius:10px;padding:0 .42rem;font-size:.67rem;margin-left:auto;font-family:'Oswald',sans-serif;font-weight:700;min-width:18px;text-align:center;display:none}
.sb-badge.gold{background:var(--gold2);color:#1a1209}
.sb-divider{height:1px;background:var(--border);margin:.45rem .85rem}
.sb-footer{margin-top:auto;padding:.85rem .6rem;border-top:1px solid var(--border)}
.sb-logout{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;padding:.55rem;border-radius:7px;background:rgba(139,26,26,.15);color:#f87171;border:1px solid rgba(139,26,26,.28);font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.07em;transition:all .18s}
.sb-logout:hover{background:rgba(139,26,26,.35);color:#fff}

/* ══════════════════════════════════
   MAIN CONTENT
══════════════════════════════════ */
.main{flex:1;overflow-y:auto;padding:1.6rem 1.8rem;background:var(--ink);position:relative}

/* ══════════════════════════════════
   PAGE HEADER
══════════════════════════════════ */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.6rem;flex-wrap:wrap;gap:.75rem}
.ph-title{font-family:'Oswald',sans-serif;font-size:1.45rem;font-weight:700;letter-spacing:.03em;color:#fff;display:flex;align-items:center;gap:.5rem;line-height:1}
.ph-title i{color:var(--gold2)}
.ph-sub{font-size:.82rem;color:var(--muted);margin-top:.28rem}
.ph-actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}

/* ══════════════════════════════════
   STAT CARDS
══════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:.85rem;margin-bottom:1.5rem}
.sc{background:var(--ink2);border:1px solid var(--border);border-radius:11px;padding:1.1rem 1rem;position:relative;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s;cursor:default}
.sc:hover{border-color:rgba(212,160,23,.3);transform:translateY(-2px);box-shadow:var(--shadow)}
.sc.sc-clickable{cursor:pointer}
.sc-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.sc-bar.r{background:var(--red2)}.sc-bar.g{background:var(--gold2)}.sc-bar.gr{background:#22c55e}.sc-bar.b{background:#60a5fa}.sc-bar.p{background:#a78bfa}.sc-bar.o{background:#f59e0b}
.sc-icon{font-size:1.35rem;margin-bottom:.45rem;display:block}
.sc-val{font-family:'Oswald',sans-serif;font-size:1.85rem;font-weight:700;color:#fff;line-height:1;margin-bottom:.18rem}
.sc-val.green{color:#22c55e}.sc-val.red{color:#f87171}.sc-val.blue{color:#60a5fa}.sc-val.orange{color:#f59e0b}.sc-val.gold{color:var(--gold2)}
.sc-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.sc-sub{font-size:.67rem;color:var(--dim);margin-top:.18rem}

/* ══════════════════════════════════
   PANELS
══════════════════════════════════ */
.panel{background:var(--ink2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.2rem}
.panel-head{
  padding:.8rem 1.2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.5rem;background:rgba(0,0,0,.15)
}
.panel-title{font-family:'Oswald',sans-serif;font-size:.93rem;font-weight:600;letter-spacing:.07em;color:var(--gold2);display:flex;align-items:center;gap:.4rem}
.panel-body{padding:1rem 1.2rem}
.panel-body.no-pad{padding:0}
.panel-body.slim{padding:.6rem 1rem}

/* ══════════════════════════════════
   ALERTAS / BANNERS
══════════════════════════════════ */
.fondo-alert{display:flex;align-items:flex-start;gap:.7rem;padding:.75rem 1rem;border-radius:9px;margin-bottom:.75rem}
.fondo-alert.warn{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25)}
.fondo-alert.bad{background:rgba(139,26,26,.07);border:1px solid rgba(139,26,26,.28)}
.fondo-alert.good{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.22)}
.fondo-alert.info{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.22)}
.fondo-alert i{flex-shrink:0;font-size:1rem;margin-top:.1rem}
.fondo-alert.warn i{color:#f59e0b}.fondo-alert.bad i{color:#f87171}.fondo-alert.good i{color:#22c55e}.fondo-alert.info i{color:#818cf8}
.fondo-alert-title{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:600;color:#fff;margin-bottom:.12rem}
.fondo-alert-sub{font-size:.77rem;color:var(--muted)}

/* ══════════════════════════════════
   BOTONES
══════════════════════════════════ */
.btn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.07em;border:none;border-radius:6px;cursor:pointer;transition:all .16s;display:inline-flex;align-items:center;gap:.32rem;white-space:nowrap}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-xs{font-size:.72rem;padding:.22rem .58rem}
.btn-sm{font-size:.76rem;padding:.28rem .72rem}
.btn-md{font-size:.88rem;padding:.48rem 1.1rem}
.btn-lg{font-size:.97rem;padding:.62rem 1.5rem}
.btn-red{background:var(--red);color:#fff}.btn-red:hover:not(:disabled){background:var(--red2)}
.btn-gold{background:var(--gold2);color:#1a1209;font-weight:700}.btn-gold:hover:not(:disabled){background:var(--gold3)}
.btn-ghost{background:rgba(212,160,23,.09);color:var(--gold2);border:1px solid var(--bord-g)}.btn-ghost:hover:not(:disabled){background:rgba(212,160,23,.2)}
.btn-danger{background:rgba(139,26,26,.2);color:#f87171;border:1px solid rgba(139,26,26,.3)}.btn-danger:hover:not(:disabled){background:rgba(139,26,26,.38)}
.btn-success{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.28)}.btn-success:hover:not(:disabled){background:rgba(34,197,94,.22)}
.btn-info{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.25)}.btn-info:hover:not(:disabled){background:rgba(99,102,241,.22)}
.btn-orange{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}.btn-orange:hover:not(:disabled){background:rgba(245,158,11,.22)}
.btn-dark{background:rgba(255,255,255,.06);color:var(--cream);border:1px solid rgba(255,255,255,.08)}.btn-dark:hover:not(:disabled){background:rgba(255,255,255,.12)}

/* ══════════════════════════════════
   BADGES
══════════════════════════════════ */
.bdg{display:inline-flex;align-items:center;gap:.22rem;font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.07em;padding:.18rem .58rem;border-radius:20px;white-space:nowrap}
.bdg-p{background:rgba(212,160,23,.14);color:var(--gold2);border:1px solid rgba(212,160,23,.28)}
.bdg-ok{background:rgba(34,197,94,.14);color:#22c55e;border:1px solid rgba(34,197,94,.28)}
.bdg-bad{background:rgba(139,26,26,.2);color:#f87171;border:1px solid rgba(139,26,26,.32)}
.bdg-open{background:rgba(99,102,241,.14);color:#818cf8;border:1px solid rgba(99,102,241,.28)}
.bdg-closed{background:rgba(80,80,80,.18);color:#9ca3af;border:1px solid rgba(80,80,80,.28)}
.bdg-win{background:linear-gradient(135deg,rgba(139,26,26,.18),rgba(184,134,11,.18));color:var(--gold2);border:1px solid rgba(212,160,23,.3)}
.bdg-free{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.22)}
.bdg-warn{background:rgba(245,158,11,.14);color:#fbbf24;border:1px solid rgba(245,158,11,.28)}

/* ══════════════════════════════════
   DATATABLES OVERRIDE
══════════════════════════════════ */
.dt-container{color:var(--cream)}
.dt-container .dt-search input,.dt-container .dt-length select{background:var(--ink3)!important;border:1px solid var(--border)!important;color:var(--cream)!important;border-radius:6px!important;padding:.32rem .72rem!important;outline:none!important;font-size:.85rem!important}
.dt-container .dt-search input:focus{border-color:var(--gold2)!important}
.dt-container .dt-info,.dt-container .dt-paging{font-size:.8rem;color:var(--muted)}
.dt-container .dt-paging-button{background:var(--ink3)!important;color:var(--muted)!important;border:1px solid var(--border)!important;border-radius:5px!important;padding:.22rem .58rem!important;margin:0 .1rem!important;font-family:'Oswald',sans-serif!important;font-size:.78rem!important;cursor:pointer!important;transition:all .15s!important}
.dt-container .dt-paging-button:hover:not(.disabled){background:rgba(212,160,23,.1)!important;color:var(--gold2)!important;border-color:var(--bord-g)!important}
.dt-container .dt-paging-button.current{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}
/* DT 2.0 scroll wrapper — prevents unstyled scrollX container */
.dt-scroll-head,.dt-scroll-body{background:var(--ink2)!important}
.dt-scroll-head table,.dt-scroll-body table{background:var(--ink2)!important}
.dt-scroll{background:var(--ink2)!important;border:none!important}
table.dataTable{border-collapse:separate!important;border-spacing:0!important;width:100%!important}
table.dataTable thead tr th{background:var(--ink3)!important;border-bottom:2px solid var(--border)!important;border-top:none!important;color:var(--gold2)!important;font-family:'Oswald',sans-serif!important;font-size:.73rem!important;letter-spacing:.14em!important;text-transform:uppercase!important;padding:.68rem .85rem!important;font-weight:600!important;white-space:nowrap}
table.dataTable tbody tr{background:var(--ink2)!important;transition:background .12s}
table.dataTable tbody tr:hover{background:var(--ink3)!important}
table.dataTable tbody tr td{padding:.68rem .85rem!important;border-bottom:1px solid rgba(139,26,26,.07)!important;border-top:none!important;font-size:.87rem;vertical-align:middle;color:var(--cream)!important}
table.dataTable tbody tr:last-child td{border-bottom:none!important}
/* Fix sort icons color in DT 2.0 */
table.dataTable thead th.dt-orderable-asc .dt-column-order:before,
table.dataTable thead th.dt-orderable-desc .dt-column-order:after{color:var(--dim)!important}
table.dataTable thead th.dt-ordering-asc .dt-column-order:before,
table.dataTable thead th.dt-ordering-desc .dt-column-order:after{color:var(--gold2)!important}

/* ══════════════════════════════════
   PROGRESS BARS
══════════════════════════════════ */
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;font-size:.8rem;color:var(--muted)}
.prog-label .prog-val{font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold2)}
.prog-bg{height:7px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--red),var(--gold2));transition:width .5s ease}
.prog-fill.full{background:linear-gradient(90deg,#166534,#22c55e)}
.prog-fill.warn{background:linear-gradient(90deg,#92400e,#f59e0b)}

/* ══════════════════════════════════
   SORTEO CARDS  ← fuente única de verdad
══════════════════════════════════ */
.sorteo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.1rem;align-items:start}
.sorteo-card{background:var(--ink2);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:border-color .2s,transform .18s,box-shadow .2s;display:flex;flex-direction:column;min-height:0}
.sorteo-card:hover{border-color:rgba(212,160,23,.35);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.45)}
.sorteo-card-head{padding:.9rem 1rem;border-bottom:1px solid var(--border)}
.sorteo-card-head h3{font-family:'Oswald',sans-serif;font-size:.97rem;font-weight:600;color:#fff;margin-bottom:.15rem}
.sorteo-card-head p{font-size:.78rem;color:var(--muted)}
.sorteo-card-mid{padding:.8rem 1rem;flex:1}
.sorteo-card-foot{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;padding:.6rem .9rem;background:rgba(0,0,0,.18);border-top:1px solid var(--border)}
/* Botones dentro del pie de card */
.scf-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:'Oswald',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.05em;border-radius:6px;cursor:pointer;padding:.34rem .72rem;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;position:relative;border:1px solid transparent}
.scf-btn i{font-size:.78rem;pointer-events:none}
.scf-blue{background:rgba(99,102,241,.12);color:#818cf8;border-color:rgba(99,102,241,.25)}.scf-blue:hover{background:rgba(99,102,241,.24)}
.scf-ghost{background:rgba(212,160,23,.09);color:var(--gold2);border-color:rgba(212,160,23,.22)}.scf-ghost:hover{background:rgba(212,160,23,.2)}
.scf-gold{background:var(--gold2);color:#1a1209;font-weight:700;border-color:var(--gold2)}.scf-gold:hover{background:var(--gold3)}
.scf-muted{background:rgba(255,255,255,.05);color:var(--cream);border-color:rgba(255,255,255,.08)}.scf-muted:hover{background:rgba(255,255,255,.11)}
.scf-red{background:rgba(139,26,26,.15);color:#f87171;border-color:rgba(139,26,26,.28)}.scf-red:hover{background:rgba(139,26,26,.28)}
.scf-badge{position:absolute;top:-5px;right:-5px;background:#dc2626;color:#fff;border-radius:8px;padding:0 .28rem;font-size:.6rem;font-family:'Oswald',sans-serif;line-height:1.4}
/* Barra de gestión inferior */
.sorteo-card-mgmt{display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.22);border-radius:0 0 13px 13px;overflow:hidden}
.scm-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:.28rem;font-family:'Oswald',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.04em;border:none;background:transparent;cursor:pointer;padding:.5rem .3rem;border-right:1px solid rgba(255,255,255,.04);transition:background .14s,color .14s;white-space:nowrap}
.scm-btn:last-child{border-right:none}
.scm-btn i{font-size:.72rem;pointer-events:none}
.scm-primary{color:var(--gold2)}.scm-primary:hover{background:rgba(212,160,23,.1)}
.scm-green{color:#22c55e}.scm-green:hover{background:rgba(34,197,94,.1)}
.scm-ghost{color:var(--muted)}.scm-ghost:hover{background:rgba(255,255,255,.05);color:var(--cream)}
.scm-danger{color:#f87171}.scm-danger:hover{background:rgba(139,26,26,.18)}
/* Sorteo oculto */
.sorteo-oculto{opacity:.72;filter:saturate(.55)}
.scard-vis-ribbon{display:flex;align-items:center;gap:.35rem;font-family:'Oswald',sans-serif;font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(139,26,26,.22);border-bottom:1px solid rgba(139,26,26,.28);color:#f87171;padding:.26rem .85rem}

/* ══════════════════════════════════
   DRAWER DE EDICIÓN
══════════════════════════════════ */
.sorteo-drawer{position:fixed;inset:0;z-index:900;pointer-events:none}
.sorteo-drawer.open{pointer-events:auto}
.sorteo-drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,.62);opacity:0;transition:opacity .28s;backdrop-filter:blur(3px)}
.sorteo-drawer.open .sorteo-drawer-overlay{opacity:1}
.sorteo-drawer-panel{position:absolute;top:0;right:0;bottom:0;width:100%;max-width:460px;background:var(--ink2);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.55)}
.sorteo-drawer.open .sorteo-drawer-panel{transform:translateX(0)}
.sorteo-drawer-header{height:112px;position:relative;flex-shrink:0;overflow:hidden}
.sdh-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.78))}
.sdh-content{position:absolute;inset:0;padding:.85rem 1rem .75rem;display:flex;flex-direction:column;justify-content:flex-end}
.sorteo-drawer-close{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.82rem;cursor:pointer;transition:background .18s;flex-shrink:0}
.sorteo-drawer-close:hover{background:rgba(139,26,26,.65)}
.sorteo-drawer-body{flex:1;overflow-y:auto;padding:1rem 1.1rem;-webkit-overflow-scrolling:touch}
.sorteo-drawer-footer{padding:.8rem 1.1rem;border-top:1px solid var(--border);background:rgba(0,0,0,.18);display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-shrink:0}
.sdb-section{margin-bottom:1.1rem}
.sdb-section-title{font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold2);margin-bottom:.5rem;display:flex;align-items:center;gap:.32rem}
.sdb-label{display:block;font-family:'Oswald',sans-serif;font-size:.67rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.sdb-input{width:100%;background:var(--ink3);border:1px solid var(--border);color:var(--cream);border-radius:7px;padding:.5rem .82rem;font-size:.9rem;outline:none;font-family:inherit;transition:border-color .16s}
.sdb-input:focus{border-color:var(--gold2)}
.sdb-select{width:100%;background:var(--ink3);border:1px solid var(--border);color:var(--cream);border-radius:7px;padding:.5rem .82rem;font-size:.9rem;outline:none;cursor:pointer}

/* ══════════════════════════════════
   TOGGLE SWITCH  ← fuente única
══════════════════════════════════ */
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:22px;transition:.3s}
.toggle-slider::before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.4)}
.toggle input:checked + .toggle-slider::before{transform:translateX(18px);background:#22c55e}

/* ══════════════════════════════════
   ENVIAR PREMIOS
══════════════════════════════════ */
.ep-section-title{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-bottom:.5rem}
.ep-ronda-card{background:var(--ink2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.ep-ronda-card:hover{border-color:rgba(212,160,23,.28);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.ep-ronda-header{height:84px;position:relative;overflow:hidden}
.ep-ronda-header-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.72))}
.ep-ronda-header-body{position:absolute;inset:0;padding:.6rem .85rem;display:flex;align-items:flex-end;justify-content:space-between;gap:.5rem}
.ep-ronda-nombre{font-family:'Oswald',sans-serif;font-size:.96rem;font-weight:700;color:#fff}
.ep-ronda-sub{font-size:.7rem;color:rgba(255,255,255,.62);margin-top:.1rem}
.ep-ganadores-list{padding:.65rem .8rem;display:flex;flex-direction:column;gap:.45rem}
.ep-ganador{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.ep-g-pendiente{background:var(--ink3);border-color:rgba(245,158,11,.18)}
.ep-g-pagado{background:rgba(34,197,94,.03);border-color:rgba(34,197,94,.18)}
.ep-g-meta{display:flex;align-items:center;gap:.5rem;padding:.55rem .7rem}
.ep-g-emoji{font-size:1.15rem;flex-shrink:0;line-height:1}
.ep-g-av{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--red),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.7rem;font-weight:700;color:#fff}
.ep-g-info{flex:1;min-width:0}
.ep-g-nombre{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-g-lugar{font-size:.68rem;color:var(--muted);margin-top:.05rem}
.ep-g-monto{text-align:right;flex-shrink:0}
.ep-btn-pagar{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;padding:.5rem .75rem;background:linear-gradient(135deg,#1a0d02,var(--red));border:none;color:#fff;font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:opacity .18s;border-top:1px solid rgba(139,26,26,.25)}
.ep-btn-pagar:hover{opacity:.88}
.ep-btn-pagar i{font-size:.9rem;color:var(--gold2)}

/* ══════════════════════════════════
   QR USUARIOS  ← fuente única
══════════════════════════════════ */
.qr-user-box{display:flex;align-items:flex-start;gap:.85rem;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.qr-user-box:last-child{border-bottom:none}
.qrb-img{width:68px;height:68px;object-fit:cover;border-radius:9px;border:2px solid rgba(212,160,23,.2);flex-shrink:0;cursor:pointer;background:#fff;transition:border-color .18s}
.qrb-img:hover{border-color:rgba(212,160,23,.55)}
.qrb-body{flex:1;min-width:0}
.qrb-name{font-family:'Oswald',sans-serif;font-size:.92rem;font-weight:700;color:#fff;margin-bottom:.18rem}
.qrb-meta{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;margin-bottom:.45rem}
.qrb-actions{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}

/* ══════════════════════════════════
   FINANZAS  ← fuente única, sin conflicto
══════════════════════════════════ */
.fin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-bottom:1.3rem}
.fin-card{background:var(--ink2);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;position:relative;overflow:hidden}
/* Strip de color superior por tipo */
.fin-ganancia::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#166534,#22c55e)}
.fin-riesgo::before {content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#92400e,#f59e0b)}
.fin-alerta::before {content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7f1d1d,#ef4444)}
.fin-neutral::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold2))}
/* Tint de fondo sutil por tipo */
.fin-ganancia{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.03)}
.fin-riesgo  {border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.03)}
.fin-alerta  {border-color:rgba(139,26,26,.3);  background:rgba(139,26,26,.04)}
.fin-neutral {border-color:rgba(99,102,241,.2);  background:rgba(99,102,241,.02)}
.fin-icon{font-size:1.4rem;margin-bottom:.4rem}
.fin-lbl{font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.22rem}
.fin-val{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;line-height:1.1;margin-bottom:.18rem}
.fin-val.green{color:#22c55e}.fin-val.orange{color:#f59e0b}.fin-val.red{color:#f87171}.fin-val.blue{color:#60a5fa}
.fin-sub{font-size:.74rem;color:var(--muted)}
/* Barra de margen */
.margen-bar{margin-top:.5rem}
.margen-row{display:flex;justify-content:space-between;margin-bottom:.22rem;font-size:.75rem}
.margen-label{color:var(--muted)}.margen-pct{font-family:'Oswald',sans-serif;font-weight:700;color:#fff}
.margen-track{height:6px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.margen-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#166534,#22c55e);transition:width .5s}
.margen-fill.warn{background:linear-gradient(90deg,#92400e,#f59e0b)}
.margen-fill.bad {background:linear-gradient(90deg,#7f1d1d,#ef4444)}

/* ══════════════════════════════════
   CONFIGURACIÓN
══════════════════════════════════ */
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:.88rem;font-weight:600;color:#fff;margin-bottom:.1rem}
.cfg-sub{font-size:.75rem;color:var(--muted)}

/* ══════════════════════════════════
   ACCIÓN ROW (dashboard)
══════════════════════════════════ */
.act-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid rgba(139,26,26,.07);flex-wrap:wrap;gap:.35rem}
.act-row:last-child{border-bottom:none}
.act-left{display:flex;align-items:center;gap:.6rem;min-width:0}
.act-av{width:32px;height:32px;border-radius:50%;background:rgba(139,26,26,.2);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:.9rem;flex-shrink:0}
.act-name{font-size:.88rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-sub{font-size:.73rem;color:var(--muted)}
.act-amount{font-family:'Oswald',sans-serif;font-size:.93rem;color:var(--gold2);flex-shrink:0}

/* ══════════════════════════════════
   UTILIDADES
══════════════════════════════════ */
.text-gold{color:var(--gold2)!important}.text-green{color:#22c55e!important}.text-red{color:#f87171!important}.text-muted{color:var(--muted)!important}
.font-oswald{font-family:'Oswald',sans-serif!important}
.gap2{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}

/* ══════════════════════════════════
   KPI MINI
══════════════════════════════════ */
.kpi-row{display:flex;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.kpi{flex:1;min-width:120px;background:var(--ink3);border:1px solid var(--border);border-radius:9px;padding:.65rem .85rem}
.kpi-val{font-family:'Oswald',sans-serif;font-size:1.35rem;font-weight:700;color:#fff}
.kpi-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:.08rem}

/* ══════════════════════════════════
   FIELD
══════════════════════════════════ */
.field{margin-bottom:1rem}
.field:last-child{margin-bottom:0}
.field label{display:block;font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.field input,.field select,.field textarea{width:100%;background:var(--ink3);border:1px solid var(--border);color:var(--cream);border-radius:7px;padding:.55rem .82rem;font-size:.92rem;outline:none;transition:border-color .18s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold2)}
.field input::placeholder,.field textarea::placeholder{color:var(--dim)}
.field select option{background:var(--ink3)}
.field textarea{resize:vertical;min-height:80px}

/* ══════════════════════════════════
   NOTIFICACIÓN TOAST
══════════════════════════════════ */
#notifStack{position:fixed;top:calc(var(--th) + .6rem);right:.8rem;z-index:2000;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.notif-item{background:var(--ink3);border:1px solid var(--border);border-radius:9px;padding:.6rem .9rem;font-size:.83rem;color:var(--cream);display:flex;align-items:center;gap:.55rem;min-width:240px;max-width:320px;pointer-events:auto;box-shadow:var(--shadow);animation:notifIn .25s cubic-bezier(.4,0,.2,1)}
.notif-item.notif-ok {border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06)}
.notif-item.notif-err{border-color:rgba(139,26,26,.3);background:rgba(139,26,26,.06)}
.notif-item.notif-warn{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06)}
.notif-item i{flex-shrink:0;font-size:.95rem}
.notif-item.notif-ok i{color:#22c55e}.notif-item.notif-err i{color:#f87171}.notif-item.notif-warn i{color:#f59e0b}
@keyframes notifIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════════════════════
   EMPTY / SPINNER
══════════════════════════════════ */
.empty{text-align:center;padding:3.2rem 1rem}
.empty i{font-size:2.6rem;color:var(--dim);display:block;margin-bottom:.6rem}
.empty p{color:var(--muted);font-size:.92rem;line-height:1.6}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:4rem}
.spinner{width:34px;height:34px;border:3px solid rgba(212,160,23,.1);border-top-color:var(--gold2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════
   SWAL THEME
══════════════════════════════════ */
.swal2-popup{background:var(--ink2)!important;border:1px solid var(--border)!important;color:var(--cream)!important;font-family:'Source Sans 3',sans-serif!important;border-radius:14px!important;box-shadow:var(--shadow-lg)!important}
.swal2-title{color:#fff!important;font-family:'Oswald',sans-serif!important;letter-spacing:.04em!important}
.swal2-html-container{color:var(--muted)!important;font-size:.95rem!important;line-height:1.55!important;max-height:65vh;overflow-y:auto!important}
.swal2-confirm{background:var(--red)!important;font-family:'Oswald',sans-serif!important;font-weight:600!important;letter-spacing:.07em!important;border-radius:6px!important;padding:.5rem 1.3rem!important}
.swal2-cancel{background:var(--ink3)!important;color:var(--muted)!important;border:1px solid var(--border)!important;font-family:'Oswald',sans-serif!important;border-radius:6px!important}
.swal2-confirm:hover{background:var(--red2)!important}
.swal2-input,.swal2-textarea{background:var(--ink3)!important;border:1px solid var(--border)!important;color:var(--cream)!important;border-radius:7px!important;font-size:.93rem!important}
.swal2-input:focus,.swal2-textarea:focus{border-color:var(--gold2)!important;box-shadow:none!important}
.swal2-icon.swal2-success .swal2-success-ring{border-color:rgba(34,197,94,.3)!important}
.swal2-icon.swal2-success [class^=swal2-success-line]{background:#22c55e!important}
.swal2-loader{border-color:var(--gold2) transparent var(--gold2) transparent!important}

/* ══════════════════════════════════
   TOOLTIPS  ← fuente única
══════════════════════════════════ */
[data-tip]{position:relative}
[data-tip]::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%) translateY(4px);
  background:#0c0a07;
  color:#e6dcc8;
  font-family:'Source Sans 3',sans-serif;
  font-size:.72rem;
  font-weight:600;
  white-space:nowrap;
  padding:.3rem .7rem;
  border-radius:6px;
  border:1px solid rgba(212,160,23,.3);
  box-shadow:0 4px 18px rgba(0,0,0,.55);
  pointer-events:none;
  opacity:0;
  transition:opacity .15s ease,transform .15s ease;
  z-index:9999;
}
[data-tip]::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 2px);
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:rgba(212,160,23,.3);
  pointer-events:none;
  opacity:0;
  transition:opacity .15s ease;
  z-index:9999;
}
[data-tip]:hover::after,[data-tip]:hover::before{opacity:1;transform:translateX(-50%) translateY(0)}
[data-tip].tip-down::after{bottom:auto;top:calc(100% + 8px);transform:translateX(-50%) translateY(-4px)}
[data-tip].tip-down::before{bottom:auto;top:calc(100% + 2px);border-top-color:transparent;border-bottom-color:rgba(212,160,23,.3)}
[data-tip].tip-down:hover::after{transform:translateX(-50%) translateY(0)}
[data-tip].tip-left::after{left:auto;right:0;transform:translateY(-4px)}
[data-tip].tip-left::before{left:auto;right:12px}
[data-tip].tip-left:hover::after{transform:translateY(0)}

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media(max-width:900px){
  .sorteo-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .ep-grid{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr 1fr}
  .fin-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  html,body{overflow:auto}
  .layout{overflow:visible}
  .main{overflow:visible;padding:1rem}
  .sidebar{position:fixed;top:var(--th);left:0;bottom:0;z-index:510;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .hamburger{display:block}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .sorteo-grid{grid-template-columns:1fr}
  .fin-grid{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .tb-pill span:not(strong){display:none}
  .sorteo-drawer-panel{max-width:100%}
  .scm-btn{font-size:.65rem;padding:.46rem .25rem}
  .scf-btn{font-size:.71rem;padding:.3rem .55rem}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr}
  .sorteo-card-mgmt{flex-wrap:wrap}
  .scm-btn{flex:1 1 48%;border-right:none;border-top:1px solid rgba(255,255,255,.04)}
  .scm-btn:nth-child(odd){border-right:1px solid rgba(255,255,255,.04)}
  .sorteo-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="notifStack"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="tb-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Menú"><i class="bi bi-list"></i></button>
    <div class="tb-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 7v5c0 5 3.5 9.74 8 11 4.5-1.26 8-6 8-11V7L12 2z"/>
      </svg>
      EL PADRINO
    </div>
    <span style="font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);padding:.15rem .5rem;border:1px solid var(--border);border-radius:4px">ADMIN</span>
  </div>
  <div class="tb-right">
    <div style="display:flex;align-items:center;gap:.38rem" title="Datos en tiempo real">
      <span class="rt-dot"></span>
      <span class="rt-label">En vivo</span>
    </div>
    <div class="tb-pill">
      <i class="bi bi-shield-fill"></i>
      <strong id="adminName">—</strong>
    </div>
    <button class="btn-logout" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Salir</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-profile">
      <div class="sb-av" id="sbAv">A</div>
      <div>
        <div class="sb-name" id="sbName">—</div>
        <div class="sb-role">Administrador</div>
      </div>
    </div>

    <div class="sb-sec">Principal</div>
    <button class="nav-item active" data-view="dashboard"><i class="bi bi-speedometer2"></i>Dashboard</button>

    <div class="sb-sec">Finanzas</div>
    <button class="nav-item" data-view="finanzas"><i class="bi bi-graph-up-arrow"></i>Finanzas</button>
    <button class="nav-item" data-view="pagos_pendientes">
      <i class="bi bi-hourglass-split"></i>Pagos pendientes
      <span id="badgePend" class="sb-badge"></span>
    </button>
    <button class="nav-item" data-view="enviar_premios">
      <i class="bi bi-cash-coin"></i>Enviar premios
      <span id="badgePremios" class="sb-badge gold"></span>
    </button>

    <div class="sb-sec">Sorteos</div>
    <button class="nav-item" data-view="sorteos"><i class="bi bi-ticket-perforated-fill"></i>Sorteos</button>

<script>
/* Sidebar móvil */
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('sidebarOverlay');
const hamburger = document.getElementById('hamburgerBtn');
hamburger.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
});
document.querySelectorAll('.nav-item').forEach(b => {
  b.addEventListener('click', () => {
    if (window.innerWidth < 769) {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }
  });
});
</script>
