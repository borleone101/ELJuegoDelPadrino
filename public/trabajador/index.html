<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Trabajador | El Padrino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.datatables.net/2.0.3/css/dataTables.dataTables.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* ══════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════ */
:root{
  --ink:#0c0a07;--ink2:#131009;--ink3:#1b1610;--ink4:#221c14;
  --red:#8b1a1a;--red2:#b52020;
  --gold:#b8860b;--gold2:#d4a017;--gold3:#e8c04a;
  --blue:#1a5a9a;--blue2:#2563eb;--blue3:#60a5fa;
  --purple:#6d28d9;--purple2:#8b5cf6;--purple3:#c4b5fd;
  --green:#166534;--green2:#22c55e;
  --cream:#e6dcc8;--muted:#8a7a62;--dim:#554535;--dimmer:#3a2e1e;
  --border:rgba(139,26,26,.22);--bord-g:rgba(212,160,23,.14);--bord-b:rgba(26,90,154,.2);
  --sw:240px;--th:58px;
  --shadow:0 4px 20px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Source Sans 3',sans-serif;background:var(--ink);color:var(--cream)}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--ink2)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--th);z-index:600;
  background:rgba(13,10,7,.97);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.2rem;
}
.tb-left{display:flex;align-items:center;gap:.8rem}
.tb-brand{font-family:'Oswald',sans-serif;font-size:1.18rem;font-weight:700;color:var(--gold2);letter-spacing:.1em;display:flex;align-items:center;gap:.45rem}
.tb-role{font-size:.67rem;background:rgba(26,90,154,.2);color:var(--blue3);border:1px solid rgba(26,90,154,.32);border-radius:20px;padding:.18rem .68rem;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.hamburger{display:none;background:none;border:none;color:var(--gold2);font-size:1.4rem;padding:.15rem .35rem;border-radius:5px;transition:background .18s}
.hamburger:hover{background:rgba(212,160,23,.1)}
.tb-right{display:flex;align-items:center;gap:.6rem}
.tb-pill{display:flex;align-items:center;gap:.35rem;background:var(--ink3);border:1px solid var(--bord-b);border-radius:20px;padding:.28rem .75rem .28rem .45rem;font-size:.82rem;color:var(--muted)}
.tb-pill i{color:var(--blue3);font-size:.78rem}
.tb-pill strong{color:var(--cream)}
.btn-exit{font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:.07em;padding:.32rem .85rem;border-radius:5px;background:rgba(139,26,26,.2);color:#f87171;border:1px solid rgba(139,26,26,.3);display:flex;align-items:center;gap:.3rem;transition:all .18s}
.btn-exit:hover{background:var(--red);color:#fff}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.layout{display:flex;padding-top:var(--th);height:100vh}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(2px)}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--ink2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:510;
}
.sb-profile{padding:1.1rem 1rem .9rem;border-bottom:1px solid var(--border);text-align:center}
.sb-av{width:44px;height:44px;border-radius:50%;margin:0 auto .45rem;background:linear-gradient(135deg,var(--blue),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:700;color:#fff;border:2px solid rgba(212,160,23,.2)}
.sb-username{font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;color:#fff;margin-bottom:.28rem}
/* Mini stats 2x2 */
.sb-stats{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;padding:.75rem .7rem .6rem;border-bottom:1px solid var(--border)}
.sb-stat{background:var(--ink3);border:1px solid var(--border);border-radius:8px;padding:.48rem .4rem;text-align:center}
.sb-stat-val{font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:700;color:#fff}
.sb-stat-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-top:.05rem}
.sb-stat.alert  .sb-stat-val{color:#f87171}
.sb-stat.accent .sb-stat-val{color:var(--gold2)}
.sb-stat.green  .sb-stat-val{color:#22c55e}
.sb-stat.purple .sb-stat-val{color:var(--purple3)}
/* Nav */
.sb-sec{padding:.85rem 1.1rem .25rem;font-family:'Oswald',sans-serif;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--dimmer)}
.nav-item{display:flex;align-items:center;gap:.65rem;width:calc(100% - .9rem);margin:.08rem .45rem;padding:.58rem .85rem;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--cream);font-size:.9rem;transition:all .16s;text-align:left}
.nav-item i{font-size:.9rem;color:var(--gold);flex-shrink:0;width:16px;text-align:center}
.nav-item:hover{background:rgba(212,160,23,.07);border-color:var(--bord-g);color:#fff}
.nav-item.active{background:rgba(139,26,26,.25);border-color:var(--border);color:var(--gold2)}
.nav-item.active i{color:var(--gold2)}
.nav-item.nb{background:transparent}.nav-item.nb i{color:var(--blue3)}
.nav-item.nb:hover{background:rgba(26,90,154,.1);border-color:var(--bord-b)}
.nav-item.nb.active{background:rgba(26,90,154,.2);border-color:rgba(26,90,154,.35);color:var(--blue3)}
.nav-item.np i{color:var(--purple2)}
.nav-item.np:hover{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.25)}
.nav-item.np.active{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.35);color:var(--purple3)}
.nav-item.np.active i{color:var(--purple3)}
.nav-badge{margin-left:auto;border-radius:10px;padding:0 .42rem;font-size:.65rem;font-weight:700;min-width:18px;text-align:center;font-family:'Oswald',sans-serif;display:none;align-items:center;justify-content:center;background:var(--red2);color:#fff}
.nav-badge.purple{background:var(--purple);color:#fff}
.sb-footer{margin-top:auto;padding:.85rem .6rem;border-top:1px solid var(--border)}
.sb-logout{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;padding:.55rem;border-radius:7px;background:rgba(139,26,26,.15);color:#f87171;border:1px solid rgba(139,26,26,.28);font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.07em;transition:all .18s}
.sb-logout:hover{background:rgba(139,26,26,.35);color:#fff}

/* ══════════════════════════════════
   MAIN
══════════════════════════════════ */
.main{flex:1;overflow-y:auto;padding:1.6rem 1.8rem;background:var(--ink)}

/* ══════════════════════════════════
   PAGE HEADER
══════════════════════════════════ */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.ph-title{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:.03em;color:#fff;display:flex;align-items:center;gap:.5rem;line-height:1}
.ph-title i{color:var(--gold2)}
.ph-sub{font-size:.82rem;color:var(--muted);margin-top:.28rem}
.ph-actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}

/* ══════════════════════════════════
   STAT CARDS
══════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.85rem;margin-bottom:1.5rem}
.sc{background:var(--ink2);border:1px solid var(--border);border-radius:11px;padding:1.1rem 1rem;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.sc:hover{border-color:rgba(212,160,23,.28);transform:translateY(-2px)}
.sc.sc-click{cursor:pointer}
.sc-bar{position:absolute;left:0;top:0;bottom:0;width:3px}
.sc-bar.r{background:var(--red2)}.sc-bar.g{background:var(--gold2)}.sc-bar.gr{background:#22c55e}.sc-bar.b{background:var(--blue2)}.sc-bar.p{background:var(--purple2)}
.sc-icon{font-size:1.35rem;margin-bottom:.45rem;display:block}
.sc-val{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:#fff;line-height:1;margin-bottom:.18rem}
.sc-val.green{color:#22c55e}.sc-val.gold{color:var(--gold2)}.sc-val.red{color:#f87171}.sc-val.orange{color:#f59e0b}.sc-val.purple{color:var(--purple3)}.sc-val.blue{color:var(--blue3)}
.sc-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.sc-sub{font-size:.67rem;color:var(--dim);margin-top:.18rem}

/* ══════════════════════════════════
   PANELS
══════════════════════════════════ */
.panel{background:var(--ink2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.2rem}
.panel-head{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;background:rgba(0,0,0,.15)}
.panel-title{font-family:'Oswald',sans-serif;font-size:.93rem;font-weight:600;letter-spacing:.07em;color:var(--gold2);display:flex;align-items:center;gap:.4rem}
.panel-body{padding:1rem 1.2rem}
.panel-body.no-pad{padding:0}

/* ══════════════════════════════════
   ALERTAS
══════════════════════════════════ */
.fondo-alert{display:flex;align-items:flex-start;gap:.7rem;padding:.75rem 1rem;border-radius:9px;margin-bottom:.75rem}
.fondo-alert.warn{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25)}
.fondo-alert.bad{background:rgba(139,26,26,.07);border:1px solid rgba(139,26,26,.28)}
.fondo-alert.good{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.22)}
.fondo-alert.info{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.22)}
.fondo-alert.blue{background:rgba(26,90,154,.06);border:1px solid rgba(26,90,154,.25)}
.fondo-alert.purple{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.25)}
.fondo-alert i{flex-shrink:0;font-size:1rem;margin-top:.1rem}
.fondo-alert.warn i{color:#f59e0b}.fondo-alert.bad i{color:#f87171}.fondo-alert.good i{color:#22c55e}
.fondo-alert.info i,.fondo-alert.blue i{color:var(--blue3)}.fondo-alert.purple i{color:var(--purple3)}
.fondo-alert-title{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:600;color:#fff;margin-bottom:.12rem}
.fondo-alert-sub{font-size:.77rem;color:var(--muted)}

/* ══════════════════════════════════
   BOTONES
══════════════════════════════════ */
.btn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.07em;border:none;border-radius:6px;cursor:pointer;transition:all .16s;display:inline-flex;align-items:center;gap:.32rem;white-space:nowrap}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-xs{font-size:.72rem;padding:.22rem .58rem}
.btn-sm{font-size:.76rem;padding:.28rem .72rem}
.btn-md{font-size:.88rem;padding:.48rem 1.1rem}
.btn-lg{font-size:.97rem;padding:.62rem 1.5rem}
.btn-red{background:var(--red);color:#fff}.btn-red:hover:not(:disabled){background:var(--red2)}
.btn-gold{background:var(--gold2);color:#1a1209;font-weight:700}.btn-gold:hover:not(:disabled){background:var(--gold3)}
.btn-ghost{background:rgba(212,160,23,.09);color:var(--gold2);border:1px solid var(--bord-g)}.btn-ghost:hover:not(:disabled){background:rgba(212,160,23,.2)}
.btn-danger{background:rgba(139,26,26,.2);color:#f87171;border:1px solid rgba(139,26,26,.3)}.btn-danger:hover:not(:disabled){background:rgba(139,26,26,.38)}
.btn-success{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.28)}.btn-success:hover:not(:disabled){background:rgba(34,197,94,.22)}
.btn-info{background:rgba(26,90,154,.15);color:var(--blue3);border:1px solid rgba(26,90,154,.3)}.btn-info:hover:not(:disabled){background:rgba(26,90,154,.28)}
.btn-purple{background:rgba(139,92,246,.15);color:var(--purple3);border:1px solid rgba(139,92,246,.3)}.btn-purple:hover:not(:disabled){background:rgba(139,92,246,.28)}
.btn-dark{background:rgba(255,255,255,.06);color:var(--cream);border:1px solid rgba(255,255,255,.08)}.btn-dark:hover:not(:disabled){background:rgba(255,255,255,.12)}

/* ══════════════════════════════════
   BADGES
══════════════════════════════════ */
.bdg{display:inline-flex;align-items:center;gap:.22rem;font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.07em;padding:.18rem .58rem;border-radius:20px;white-space:nowrap}
.bdg-p{background:rgba(212,160,23,.14);color:var(--gold2);border:1px solid rgba(212,160,23,.28)}
.bdg-ok{background:rgba(34,197,94,.14);color:#22c55e;border:1px solid rgba(34,197,94,.28)}
.bdg-bad{background:rgba(139,26,26,.2);color:#f87171;border:1px solid rgba(139,26,26,.32)}
.bdg-open{background:rgba(26,90,154,.15);color:var(--blue3);border:1px solid rgba(26,90,154,.3)}
.bdg-closed{background:rgba(80,80,80,.18);color:#9ca3af;border:1px solid rgba(80,80,80,.28)}
.bdg-win{background:linear-gradient(135deg,rgba(139,26,26,.18),rgba(184,134,11,.18));color:var(--gold2);border:1px solid rgba(212,160,23,.3)}
.bdg-free{background:rgba(139,92,246,.15);color:var(--purple3);border:1px solid rgba(139,92,246,.3)}

/* ══════════════════════════════════
   TOOLTIPS
══════════════════════════════════ */
[data-tip]{position:relative}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%) translateY(4px);background:#0c0a07;color:#e6dcc8;font-family:'Source Sans 3',sans-serif;font-size:.72rem;font-weight:600;white-space:nowrap;padding:.28rem .65rem;border-radius:6px;border:1px solid rgba(212,160,23,.25);box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .15s ease,transform .15s ease;z-index:9999}
[data-tip]::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0c0a07;pointer-events:none;opacity:0;transition:opacity .15s ease;z-index:9999}
[data-tip]:hover::after,[data-tip]:hover::before{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════
   NOTIF STACK
══════════════════════════════════ */
#notifStack{position:fixed;top:calc(var(--th) + .6rem);right:.8rem;z-index:2000;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.notif-item{background:var(--ink3);border:1px solid var(--border);border-radius:9px;padding:.6rem .9rem;font-size:.83rem;color:var(--cream);display:flex;align-items:center;gap:.55rem;min-width:240px;max-width:320px;pointer-events:auto;box-shadow:var(--shadow);animation:notifIn .25s cubic-bezier(.4,0,.2,1)}
.notif-item.notif-ok{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06)}
.notif-item.notif-err{border-color:rgba(139,26,26,.3);background:rgba(139,26,26,.06)}
.notif-item.notif-warn{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06)}
.notif-item.notif-info{border-color:rgba(26,90,154,.3);background:rgba(26,90,154,.06)}
.notif-item i{flex-shrink:0;font-size:.95rem}
.notif-item.notif-ok i{color:#22c55e}.notif-item.notif-err i{color:#f87171}.notif-item.notif-warn i{color:#f59e0b}.notif-item.notif-info i{color:var(--blue3)}
@keyframes notifIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════════════════════
   DATATABLES
══════════════════════════════════ */
.dt-container{color:var(--cream)}
.dt-container .dt-search input,.dt-container .dt-length select{background:var(--ink3)!important;border:1px solid var(--border)!important;color:var(--cream)!important;border-radius:6px!important;padding:.32rem .72rem!important;outline:none!important;font-size:.85rem!important}
.dt-container .dt-search input:focus{border-color:var(--gold2)!important}
.dt-container .dt-info,.dt-container .dt-paging{font-size:.8rem;color:var(--muted)}
.dt-container .dt-paging-button{background:var(--ink3)!important;color:var(--muted)!important;border:1px solid var(--border)!important;border-radius:5px!important;padding:.22rem .58rem!important;margin:0 .1rem!important;font-family:'Oswald',sans-serif!important;font-size:.78rem!important;cursor:pointer!important;transition:all .15s!important}
.dt-container .dt-paging-button:hover:not(.disabled){background:rgba(212,160,23,.1)!important;color:var(--gold2)!important;border-color:var(--bord-g)!important}
.dt-container .dt-paging-button.current{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}
table.dataTable{border-collapse:separate!important;border-spacing:0!important;width:100%!important}
table.dataTable thead tr th{background:var(--ink3)!important;border-bottom:2px solid var(--border)!important;border-top:none!important;color:var(--gold2)!important;font-family:'Oswald',sans-serif!important;font-size:.73rem!important;letter-spacing:.14em!important;text-transform:uppercase!important;padding:.68rem .85rem!important;font-weight:600!important;white-space:nowrap}
table.dataTable tbody tr{background:var(--ink2)!important;transition:background .12s}
table.dataTable tbody tr:hover{background:var(--ink3)!important}
table.dataTable tbody tr td{padding:.68rem .85rem!important;border-bottom:1px solid rgba(139,26,26,.07)!important;border-top:none!important;font-size:.87rem;vertical-align:middle;color:var(--cream)!important}
table.dataTable tbody tr:last-child td{border-bottom:none!important}

/* ══════════════════════════════════
   SORTEO CARDS
══════════════════════════════════ */
.sorteo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:1rem}
.sorteo-card{background:var(--ink3);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,transform .18s,box-shadow .2s}
.sorteo-card:hover{border-color:rgba(212,160,23,.3);transform:translateY(-2px);box-shadow:var(--shadow)}
.sorteo-card-head{padding:1rem 1.1rem;border-bottom:1px solid var(--border)}
.sorteo-card-head h3{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:#fff;margin-bottom:.18rem}
.sorteo-card-head p{font-size:.8rem;color:var(--muted)}
.sorteo-card-mid{padding:.85rem 1.1rem}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;font-size:.8rem;color:var(--muted)}
.prog-val{font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold2)}
.prog-bg{height:7px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--red),var(--gold2));transition:width .5s ease}
.prog-fill.full{background:linear-gradient(90deg,#166534,#22c55e)}
.prog-fill.almost{background:linear-gradient(90deg,#92400e,var(--gold3))}
.sorteo-card-foot{padding:.65rem 1.1rem;background:rgba(0,0,0,.15);border-top:1px solid var(--border);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}

/* ══════════════════════════════════
   CONFIGURACION ROWS
══════════════════════════════════ */
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;gap:.5rem}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:.88rem;color:var(--cream);font-weight:600}
.cfg-sub{font-size:.73rem;color:var(--muted);margin-top:.08rem}

/* ══════════════════════════════════
   EMPTY / SPIN
══════════════════════════════════ */
.empty{text-align:center;padding:3.2rem 1rem}
.empty i{font-size:2.6rem;color:var(--dim);display:block;margin-bottom:.6rem}
.empty p{color:var(--muted);font-size:.92rem;line-height:1.6}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:4rem}
.spinner{width:34px;height:34px;border:3px solid rgba(212,160,23,.1);border-top-color:var(--gold2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════
   SWAL
══════════════════════════════════ */
.swal2-popup{background:var(--ink2)!important;border:1px solid var(--border)!important;color:var(--cream)!important;font-family:'Source Sans 3',sans-serif!important;border-radius:14px!important;box-shadow:0 8px 40px rgba(0,0,0,.55)!important}
.swal2-title{color:#fff!important;font-family:'Oswald',sans-serif!important;letter-spacing:.04em!important}
.swal2-html-container{color:var(--muted)!important;font-size:.95rem!important;line-height:1.55!important;max-height:65vh;overflow-y:auto!important}
.swal2-confirm{background:var(--red)!important;font-family:'Oswald',sans-serif!important;font-weight:600!important;letter-spacing:.07em!important;border-radius:6px!important}
.swal2-cancel{background:var(--ink3)!important;color:var(--muted)!important;border:1px solid var(--border)!important;font-family:'Oswald',sans-serif!important;border-radius:6px!important}
.swal2-confirm:hover{background:var(--red2)!important}
.swal2-input,.swal2-textarea{background:var(--ink3)!important;border:1px solid var(--border)!important;color:var(--cream)!important;border-radius:7px!important;font-size:.93rem!important}
.swal2-input:focus,.swal2-textarea:focus{border-color:var(--gold2)!important;box-shadow:none!important}
.swal2-icon.swal2-success .swal2-success-ring{border-color:rgba(34,197,94,.3)!important}
.swal2-icon.swal2-success [class^=swal2-success-line]{background:#22c55e!important}
.swal2-close{color:var(--muted)!important}.swal2-close:hover{color:#fff!important}

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media(max-width:768px){
  html,body{overflow:auto}
  .layout{overflow:visible}
  .main{overflow:visible;padding:1rem}
  .sidebar{position:fixed;top:var(--th);left:0;bottom:0;z-index:510;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .hamburger{display:block}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .sorteo-grid{grid-template-columns:1fr}
  .tb-pill span:not(.tb-pill strong){display:none}
}
@media(max-width:420px){.stat-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="notifStack"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="tb-left">
    <button class="hamburger" id="hamburgerBtn" aria-label="Menú"><i class="bi bi-list"></i></button>
    <div class="tb-brand">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 7v5c0 5 3.5 9.74 8 11 4.5-1.26 8-6 8-11V7L12 2z"/>
      </svg>
      EL PADRINO
    </div>
    <span class="tb-role">Trabajador</span>
  </div>
  <div class="tb-right">
    <div class="tb-pill">
      <i class="bi bi-person-badge-fill"></i>
      <strong id="tbName">—</strong>
    </div>
    <button class="btn-exit" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Salir</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sb-profile">
      <div class="sb-av" id="sbAv">?</div>
      <div class="sb-username" id="sbName">—</div>
      <span class="bdg bdg-open" style="font-size:.63rem"><i class="bi bi-person-badge-fill"></i> Trabajador</span>
    </div>

    <div class="sb-stats">
      <div class="sb-stat alert"><div class="sb-stat-val" id="sbPend">—</div><div class="sb-stat-lbl">Pendientes</div></div>
      <div class="sb-stat accent"><div class="sb-stat-val" id="sbRondas">—</div><div class="sb-stat-lbl">Rondas</div></div>
      <div class="sb-stat green"><div class="sb-stat-val" id="sbAprobados">—</div><div class="sb-stat-lbl">Aprobé</div></div>
      <div class="sb-stat purple"><div class="sb-stat-val" id="sbBoletosGratis">—</div><div class="sb-stat-lbl">🎁 Gratis</div></div>
    </div>

    <div class="sb-sec">Principal</div>
    <button class="nav-item active" data-view="dashboard"><i class="bi bi-speedometer2"></i>Dashboard</button>

    <div class="sb-sec">Gestión</div>
    <button class="nav-item" data-view="sorteos"><i class="bi bi-ticket-perforated-fill"></i>Sorteos</button>
    <button class="nav-item" data-view="comprobantes">
      <i class="bi bi-receipt"></i>Comprobantes
      <span class="nav-badge" id="navBadgePend">0</span>
    </button>
    <button class="nav-item" data-view="ganadores"><i class="bi bi-trophy-fill"></i>Ganadores</button>
    <button class="nav-item np" data-view="fidelidad">
      <i class="bi bi-gift-fill"></i>Fidelidad
      <span class="nav-badge purple" id="navBadgeGratis">0</span>
    </button>

    <div class="sb-sec">Personal</div>
    <button class="nav-item nb" data-view="historial"><i class="bi bi-clock-history"></i>Mi actividad</button>
    <button class="nav-item nb" data-view="configuracion"><i class="bi bi-gear-fill"></i>Configuración</button>

    <div class="sb-footer">
      <button class="sb-logout" id="logoutBtn2"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</button>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="spin-wrap"><div class="spinner"></div></div>
  </main>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
<script>
const sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
document.getElementById('hamburgerBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('open')});
overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('open')});
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>{if(window.innerWidth<769){sidebar.classList.remove('open');overlay.classList.remove('open')}}));
</script>
<script type="module" src="../../assets/js/trabajador.js"></script>
</body>
</html>
