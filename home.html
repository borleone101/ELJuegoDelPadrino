<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargar El Padrino</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b1a1a">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root{
      --ink:#0c0a07;
      --paper:#f5ede0;
      --paper2:#ede3d4;
      --red:#8b1a1a;
      --red2:#b52020;
      --gold:#b8860b;
      --gold2:#d4a017;
      --white:#fff;
      --text:#1a1209;
      --muted:#5a4a36;
      --border:rgba(139,26,26,.22);
    }

    body{
      background: linear-gradient(135deg,var(--ink),#1a1209);
      color: var(--paper);
      min-height:100vh;
    }

    .navbar{
      background: var(--ink);
      border-bottom: 2px solid var(--border);
    }

    .navbar-brand{
      color: var(--gold) !important;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .btn-install{
      background: linear-gradient(45deg,var(--gold),var(--gold2));
      color: var(--ink);
      border:none;
      border-radius:50px;
      padding:8px 20px;
      font-weight:600;
      transition:.3s;
      display:none;
    }

    .btn-install:hover{
      transform:scale(1.05);
      box-shadow:0 5px 20px rgba(0,0,0,.3);
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:center;
      height:85vh;
      text-align:center;
    }

    .card-install{
      background: var(--paper2);
      color: var(--text);
      border-radius:20px;
      padding:40px;
      box-shadow:0 20px 40px rgba(0,0,0,.4);
      max-width:500px;
      width:100%;
    }

    .title{
      color:var(--red);
      font-weight:700;
      letter-spacing:2px;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">EL PADRINO</a>

    <button id="installBtnNav" class="btn-install">
      <i class="bi bi-download me-2"></i>Instalar App
    </button>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container hero">
  <div class="card-install">
    <h1 class="title mb-3">Descarga Oficial</h1>
    <p>
      Instala la aplicación oficial para acceder a sorteos digitales automáticos y transparentes.
    </p>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  let deferredPrompt;
  const installBtn = document.getElementById('installBtnNav');

  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("SW activo"))
      .catch(err => console.log(err));
  }

  // Evento instalable
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = "inline-flex";
  });

  // Click instalar
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
    }
  });

  // Si ya está instalada
  window.addEventListener('appinstalled', () => {
    installBtn.style.display = "none";
  });

  if (window.matchMedia('(display-mode: standalone)').matches) {
    installBtn.style.display = "none";
  }
</script>

</body>
</html>
