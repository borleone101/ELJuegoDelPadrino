<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar | El Padrino</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  :root{--ink:#0c0a07;--paper:#f5ede0;--red:#8b1a1a;--red2:#b52020;--gold:#d4a017;--muted:#7a6a56;--input-bg:#fffbf5}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;min-height:100%}
  body{font-family:'Source Sans 3',sans-serif;min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--ink)}

  /* ── LEFT ── */
  .left{position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4rem 3rem;background:var(--ink);overflow:hidden}
  .left::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(139,26,26,.18),transparent 70%),repeating-linear-gradient(90deg,rgba(212,160,23,.025) 0,rgba(212,160,23,.025) 1px,transparent 1px,transparent 55px)}
  .left-content{position:relative;text-align:center;max-width:340px}
  .brand-logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:2.6rem;letter-spacing:.1em;color:var(--gold);margin-bottom:.3rem;display:flex;align-items:center;justify-content:center;gap:.6rem}
  .brand-logo svg{flex-shrink:0}
  .brand-tagline{font-family:'Libre Baskerville',serif;font-style:italic;font-size:1rem;color:rgba(245,237,224,.45);margin-bottom:3rem;letter-spacing:.04em}
  .ornament{display:flex;align-items:center;justify-content:center;gap:.9rem;margin-bottom:3rem}
  .ornament-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.3))}
  .ornament-line.r{background:linear-gradient(90deg,rgba(212,160,23,.3),transparent)}
  .ornament-diamond{width:8px;height:8px;background:var(--red);transform:rotate(45deg);flex-shrink:0}
  .left-quote{font-family:'Libre Baskerville',serif;font-style:italic;font-size:1.25rem;line-height:1.8;color:rgba(245,237,224,.7);margin-bottom:.8rem}
  .left-quote-author{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:var(--red2)}

  /* ── RIGHT ── */
  .right{background:var(--paper);display:flex;flex-direction:column;justify-content:center;padding:3.5rem clamp(2rem,6vw,5rem);overflow-y:auto}
  .form-header{margin-bottom:2.8rem}
  .form-tag{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;color:var(--red2);margin-bottom:.5rem}
  .form-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:2.4rem;letter-spacing:.03em;color:var(--ink);line-height:1}

  /* ── FIELDS ── */
  .field{margin-bottom:2rem}
  .field label{display:block;font-family:'Oswald',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem}
  .field input{display:block;width:100%;background:var(--input-bg);border:none;border-bottom:2px solid rgba(139,26,26,.2);border-radius:0;padding:.85rem 0;font-family:'Source Sans 3',sans-serif;font-size:1.1rem;color:var(--ink);outline:none;transition:border-color .22s;-webkit-appearance:none}
  .field input:focus{border-bottom-color:var(--red2)}
  .field input::placeholder{color:rgba(90,74,54,.35)}
  .input-wrap{position:relative}
  .input-wrap input{padding-right:2.5rem}
  .toggle-pw{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:.3rem;transition:color .2s}
  .toggle-pw:hover{color:var(--red2)}

  /* ── BOTÓN PRINCIPAL ── */
  .btn-submit{display:block;width:100%;font-family:'Oswald',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.12em;text-transform:uppercase;background:var(--red);color:#fff;border:none;padding:1.05rem;border-radius:6px;cursor:pointer;transition:all .25s;box-shadow:0 6px 22px rgba(139,26,26,.32);margin-top:.5rem}
  .btn-submit:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,26,26,.45)}
  .btn-submit:active{transform:translateY(0)}
  .btn-submit:disabled{opacity:.7;cursor:not-allowed;transform:none}

  /* ── DIVISOR ── */
  .divider{display:flex;align-items:center;gap:.8rem;margin:1.6rem 0}
  .divider-line{flex:1;height:1px;background:rgba(139,26,26,.15)}
  .divider-text{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap}

  /* ── BOTÓN GOOGLE ── */
  .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;min-height:52px;padding:0 20px;background:#ffffff;color:#1f1f1f;border:1.5px solid #c8c8c8;border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:1.05rem;font-weight:600;letter-spacing:.01em;cursor:pointer;transition:background .18s,box-shadow .18s,transform .18s,border-color .18s;box-shadow:0 2px 6px rgba(0,0,0,.14),0 1px 2px rgba(0,0,0,.1);-webkit-font-smoothing:antialiased}
  .btn-google:hover{background:#f5f5f5;border-color:#aaa;box-shadow:0 4px 12px rgba(0,0,0,.18);transform:translateY(-2px)}
  .btn-google:active{transform:translateY(0);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .btn-google:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-google .g-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

  /* ── SPINNER ── */
  .g-spinner{width:20px;height:20px;border:2.5px solid #dadce0;border-top-color:#4285f4;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── OVERLAY ── */
  .redirect-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(12,10,7,.92);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:1.4rem}
  .redirect-overlay.show{display:flex}
  .ro-spinner{width:48px;height:48px;border:3px solid rgba(212,160,23,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  .ro-logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:.12em;color:var(--gold);opacity:.9}
  .ro-text{font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,237,224,.5)}

  /* ── BOTÓN CANCELAR OVERLAY ── */
  .ro-cancel{margin-top:.5rem;background:none;border:1px solid rgba(245,237,224,.2);color:rgba(245,237,224,.4);font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;padding:.45rem 1.2rem;border-radius:4px;cursor:pointer;transition:all .2s}
  .ro-cancel:hover{border-color:rgba(245,237,224,.5);color:rgba(245,237,224,.7)}

  .form-footer{text-align:center;margin-top:2rem;font-size:1rem;color:var(--muted)}
  .form-footer a{color:var(--red);text-decoration:none;font-weight:600;transition:color .2s}
  .form-footer a:hover{color:var(--red2)}

  @media(max-width:820px){
    body{grid-template-columns:1fr;grid-template-rows:auto 1fr;min-height:100vh;height:auto}
    html,body{height:auto}
    .left{padding:2rem 1.5rem 1.8rem;min-height:auto}
    .left-quote,.left-quote-author,.ornament{display:none}
    .brand-tagline{margin-bottom:0}
    .brand-logo{font-size:1.9rem}
    .right{padding:2.2rem 1.4rem 3rem;min-height:auto}
    .form-header{margin-bottom:2rem}
    .form-title{font-size:1.75rem}
    .field{margin-bottom:1.5rem}
    .field input{font-size:1rem;padding:.75rem 0}
    .btn-submit{font-size:1rem;padding:.9rem}
    .btn-google{font-size:.98rem;min-height:48px}
    .form-footer{margin-top:1.5rem}
  }
  @media(min-width:1200px){.right{padding:4rem 6rem}}
</style>
</head>
<body>

<!-- Overlay de carga / redirección -->
<div class="redirect-overlay" id="redirectOverlay">
  <div class="ro-logo">EL PADRINO</div>
  <div class="ro-spinner"></div>
  <div class="ro-text" id="roText">Cargando…</div>
  <button class="ro-cancel" id="roCancelBtn" style="display:none">Cancelar</button>
</div>

<div class="left">
  <div class="left-content">
    <div class="brand-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 7v5c0 5 3.5 9.74 8 11 4.5-1.26 8-6 8-11V7L12 2z"/>
      </svg>
      EL PADRINO
    </div>
    <div class="brand-tagline">Sorteos Digitales · Est. 2026</div>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>
    <p class="left-quote">"La suerte favorece<br>a los que se preparan."</p>
    <p class="left-quote-author">— La Familia</p>
  </div>
</div>

<div class="right">
  <div class="form-header">
    <div class="form-tag">Bienvenido de vuelta</div>
    <div class="form-title">Iniciar sesión</div>
  </div>

  <button class="btn-google" id="btnGoogle" type="button">
    <span class="g-icon" id="gIcon">
      <svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" fill-rule="evenodd">
          <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </g>
      </svg>
    </span>
    <span id="gLabel">Continuar con Google</span>
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">o con correo</span>
    <div class="divider-line"></div>
  </div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="identifier">Usuario o correo</label>
      <input type="text" id="identifier" placeholder="tu_usuario o correo@ejemplo.com" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="toggle-pw" aria-label="Mostrar contraseña">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="btnSubmit">Entrar</button>
  </form>

  <p class="form-footer">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
</div>

<script type="module">
import { supabase } from "../assets/js/supabase.js";

// ─── Constantes ────────────────────────────────────────────────────────
const BASE = "https://borleone101.github.io/ELJuegoDelPadrino";
const RUTAS = {
  admin:      `${BASE}/public/admin/index.html`,
  trabajador: `${BASE}/public/trabajador/index.html`,
  usuario:    `${BASE}/public/usuario/index.html`,
};
const GOOGLE_SVG = `<svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></g></svg>`;

// ─── Estado global: evita que dos flujos corran en paralelo ───────────
let navegando = false;

// ─── UI helpers ────────────────────────────────────────────────────────
const overlay    = document.getElementById("redirectOverlay");
const roText     = document.getElementById("roText");
const roCancelBtn= document.getElementById("roCancelBtn");
const btnGoogle  = document.getElementById("btnGoogle");
const gIcon      = document.getElementById("gIcon");
const gLabel     = document.getElementById("gLabel");
const btnSubmit  = document.getElementById("btnSubmit");

let overlayTimeout = null;

const showOverlay = (txt, cancelable = false) => {
  if (overlayTimeout) clearTimeout(overlayTimeout);
  roText.textContent = txt;
  overlay.classList.add("show");
  roCancelBtn.style.display = cancelable ? "block" : "none";

  // Timeout de seguridad: si tarda más de 12s, ofrecer cancelar
  overlayTimeout = setTimeout(() => {
    roText.textContent = "Tardando más de lo normal…";
    roCancelBtn.style.display = "block";
  }, 12000);
};

const hideOverlay = () => {
  if (overlayTimeout) clearTimeout(overlayTimeout);
  overlay.classList.remove("show");
  roCancelBtn.style.display = "none";
  navegando = false;
};

// Botón cancelar del overlay — limpia sesión colgada y muestra el form
roCancelBtn.addEventListener("click", async () => {
  hideOverlay();
  resetGoogle();
  btnSubmit.disabled    = false;
  btnSubmit.textContent = "Entrar";
  // Limpiar sesión rota si existe
  try { await supabase.auth.signOut(); } catch(_){}
});

const showErr = (title, text) =>
  Swal.fire({ icon:"error", title, text, confirmButtonColor:"#8b1a1a" });

const resetGoogle = () => {
  btnGoogle.disabled = false;
  gIcon.innerHTML    = GOOGLE_SVG;
  gLabel.textContent = "Continuar con Google";
};

// ─── Redirigir según rol ───────────────────────────────────────────────
async function redirigirSegunRol(userId) {
  try {
    const { data: profile, error } = await supabase
      .from("profiles")
      .select("rol, estado")
      .eq("id", userId)
      .single();

    if (error) throw error;

    if (profile?.estado === "suspendido") {
      await supabase.auth.signOut();
      hideOverlay();
      showErr("Cuenta suspendida", "Tu cuenta está suspendida. Contacta al administrador.");
      return;
    }

    window.location.href = RUTAS[profile?.rol] ?? RUTAS.usuario;

  } catch (err) {
    console.error("Error perfil:", err);
    // Si falla obtener el perfil, igual enviamos al dashboard de usuario
    window.location.href = RUTAS.usuario;
  }
}

// ─── INIT: lógica de arranque (token_hash o sesión activa) ─────────────
// Se ejecuta UNA SOLA VEZ al cargar la página. Después de esto,
// onAuthStateChange solo actúa si viene de Google OAuth.
(async () => {
  const params    = new URLSearchParams(window.location.search);
  const tokenHash = params.get("token_hash");
  const type      = params.get("type");

  // 1️⃣ Viene del link de confirmación de correo
  if (tokenHash && type) {
    navegando = true;
    showOverlay("Confirmando cuenta…");
    window.history.replaceState({}, "", window.location.pathname);

    const { data, error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type });

    if (error) {
      hideOverlay();
      Swal.fire({
        icon: "error",
        title: "Enlace inválido",
        html: "Este enlace ya fue usado o expiró.<br>Inicia sesión normalmente.",
        confirmButtonColor: "#8b1a1a",
      });
      return;
    }

    if (data?.user) {
      roText.textContent = "¡Cuenta confirmada! Entrando…";
      await redirigirSegunRol(data.user.id);
    }
    return;
  }

  // 2️⃣ Verificar sesión activa (auto-login tipo app)
  try {
    showOverlay("Verificando sesión…");

    const { data: { session }, error } = await supabase.auth.getSession();

    if (error || !session?.user) {
      // Sin sesión válida → mostrar formulario normalmente
      hideOverlay();
      return;
    }

    // Hay sesión activa → entrar directo, sin preguntar
    navegando = true;
    roText.textContent = "Sesión activa, entrando…";
    await redirigirSegunRol(session.user.id);

  } catch (e) {
    console.warn("getSession error:", e);
    hideOverlay();
  }
})();

// ─── onAuthStateChange: SOLO para el callback de Google OAuth ──────────
// Usamos la bandera `navegando` para no interferir con el IIFE de arriba
// ni con el submit del formulario.
let oauthEscuchando = false;
supabase.auth.onAuthStateChange(async (event, session) => {
  // Ignorar si ya estamos navegando o si es el disparo inicial
  if (navegando) return;
  if (event !== "SIGNED_IN") return;
  if (!session?.user) return;
  // Solo actuar si fue un OAuth (Google) — el form maneja su propio flujo
  if (btnSubmit.disabled) return; // el form está activo, él lo gestiona

  // Viene de Google redirect
  if (!oauthEscuchando) {
    oauthEscuchando = true;
    return; // ignorar el primer disparo inicial al montar el listener
  }

  navegando = true;
  showOverlay("Verificando cuenta…");
  await redirigirSegunRol(session.user.id);
});

// ─── Botón Google ──────────────────────────────────────────────────────
btnGoogle.addEventListener("click", async () => {
  if (navegando) return;
  btnGoogle.disabled = true;
  gIcon.innerHTML    = `<div class="g-spinner"></div>`;
  gLabel.textContent = "Conectando…";
  showOverlay("Conectando con Google…", true);

  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: `${BASE}/auth/login.html` },
  });

  if (error) {
    hideOverlay();
    showErr("Error con Google", error.message);
    resetGoogle();
  }
  // Si no hay error, el navegador redirige a Google — el overlay queda visible OK
});

// ─── Toggle contraseña ─────────────────────────────────────────────────
document.querySelector(".toggle-pw").addEventListener("click", () => {
  const inp  = document.getElementById("password");
  const icon = document.querySelector(".toggle-pw i");
  inp.type   = inp.type === "password" ? "text" : "password";
  icon.classList.toggle("bi-eye");
  icon.classList.toggle("bi-eye-slash");
});

// ─── Login con email / username ────────────────────────────────────────
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  if (navegando) return;

  const identifier = document.getElementById("identifier").value.trim();
  const password   = document.getElementById("password").value;

  if (!identifier || !password) {
    showErr("Campos vacíos", "Completa todos los campos.");
    return;
  }

  navegando             = true;
  btnSubmit.disabled    = true;
  btnSubmit.textContent = "Verificando…";

  try {
    let email = identifier;

    if (!identifier.includes("@")) {
      const { data: resolvedEmail, error: rpcErr } = await supabase
        .rpc("get_email_by_username", { p_username: identifier.toLowerCase() });

      if (rpcErr || !resolvedEmail) {
        navegando = false;
        showErr("No encontrado", "Usuario no encontrado. Intenta con tu correo electrónico.");
        return;
      }
      email = resolvedEmail;
    }

    const { data: authData, error: authErr } =
      await supabase.auth.signInWithPassword({ email, password });

    if (authErr) {
      navegando = false;
      if (authErr.message.includes("Email not confirmed")) {
        Swal.fire({
          icon: "warning",
          title: "Confirma tu correo",
          text: "Revisa tu bandeja de entrada y confirma tu cuenta antes de ingresar.",
          confirmButtonColor: "#8b1a1a",
        });
      } else {
        showErr("Credenciales incorrectas", "Usuario o contraseña incorrectos.");
      }
      return;
    }

    if (!authData.user.email_confirmed_at) {
      await supabase.auth.signOut();
      navegando = false;
      Swal.fire({
        icon: "warning",
        title: "Confirma tu correo",
        text: "Debes confirmar tu correo antes de ingresar.",
        confirmButtonColor: "#8b1a1a",
      });
      return;
    }

    showOverlay("Iniciando sesión…");
    await redirigirSegunRol(authData.user.id);

  } catch (err) {
    console.error("Login error:", err);
    navegando = false;
    hideOverlay();
    showErr("Error inesperado", "Intenta de nuevo más tarde.");
  } finally {
    btnSubmit.disabled    = false;
    btnSubmit.textContent = "Entrar";
  }
});
</script>
</body>
</html>
