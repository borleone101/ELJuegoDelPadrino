<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar | El Padrino</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  :root{--ink:#0c0a07;--paper:#f5ede0;--red:#8b1a1a;--red2:#b52020;--gold:#d4a017;--muted:#7a6a56;--input-bg:#fffbf5}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Source Sans 3',sans-serif;min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--ink)}
  .left{position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4rem 3rem;background:var(--ink);overflow:hidden}
  .left::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(139,26,26,.18),transparent 70%),repeating-linear-gradient(90deg,rgba(212,160,23,.025) 0,rgba(212,160,23,.025) 1px,transparent 1px,transparent 55px)}
  .left-content{position:relative;text-align:center;max-width:340px}
  .brand-logo{font-family:'Oswald',sans-serif;font-weight:700;font-size:2.6rem;letter-spacing:.1em;color:var(--gold);margin-bottom:.3rem;display:flex;align-items:center;justify-content:center;gap:.6rem}
  .brand-logo svg{flex-shrink:0}
  .brand-tagline{font-family:'Libre Baskerville',serif;font-style:italic;font-size:1rem;color:rgba(245,237,224,.45);margin-bottom:3rem;letter-spacing:.04em}
  .ornament{display:flex;align-items:center;justify-content:center;gap:.9rem;margin-bottom:3rem}
  .ornament-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.3))}
  .ornament-line.r{background:linear-gradient(90deg,rgba(212,160,23,.3),transparent)}
  .ornament-diamond{width:8px;height:8px;background:var(--red);transform:rotate(45deg);flex-shrink:0}
  .left-quote{font-family:'Libre Baskerville',serif;font-style:italic;font-size:1.25rem;line-height:1.8;color:rgba(245,237,224,.7);margin-bottom:.8rem}
  .left-quote-author{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:var(--red2)}
  .right{background:var(--paper);display:flex;flex-direction:column;justify-content:center;padding:3.5rem clamp(2rem,6vw,5rem);overflow-y:auto}
  .form-header{margin-bottom:2.8rem}
  .form-tag{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;color:var(--red2);margin-bottom:.5rem}
  .form-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:2.4rem;letter-spacing:.03em;color:var(--ink);line-height:1}
  .field{margin-bottom:2rem}
  .field label{display:block;font-family:'Oswald',sans-serif;font-weight:600;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem}
  .field input{display:block;width:100%;background:var(--input-bg);border:none;border-bottom:2px solid rgba(139,26,26,.2);border-radius:0;padding:.85rem 0;font-family:'Source Sans 3',sans-serif;font-size:1.1rem;color:var(--ink);outline:none;transition:border-color .22s;-webkit-appearance:none}
  .field input:focus{border-bottom-color:var(--red2)}
  .field input::placeholder{color:rgba(90,74,54,.35)}
  .input-wrap{position:relative}
  .input-wrap input{padding-right:2.5rem}
  .toggle-pw{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:.3rem;transition:color .2s}
  .toggle-pw:hover{color:var(--red2)}
  .btn-submit{display:block;width:100%;font-family:'Oswald',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.12em;text-transform:uppercase;background:var(--red);color:#fff;border:none;padding:1.05rem;border-radius:6px;cursor:pointer;transition:all .25s;box-shadow:0 6px 22px rgba(139,26,26,.32);margin-top:.5rem}
  .btn-submit:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,26,26,.45)}
  .btn-submit:active{transform:translateY(0)}
  .btn-submit:disabled{opacity:.7;cursor:not-allowed;transform:none}
  .form-footer{text-align:center;margin-top:2rem;font-size:1rem;color:var(--muted)}
  .form-footer a{color:var(--red);text-decoration:none;font-weight:600;transition:color .2s}
  .form-footer a:hover{color:var(--red2)}
  @media(max-width:700px){
    body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .left{padding:2.5rem 1.5rem 2rem;min-height:auto}
    .left-quote,.left-quote-author,.ornament{display:none}
    .brand-tagline{margin-bottom:0}
    .brand-logo{font-size:2rem}
    .right{padding:2.5rem 1.5rem 3rem}
    .form-title{font-size:1.9rem}
    .field{margin-bottom:1.6rem}
  }
  @media(min-width:1200px){.right{padding:4rem 6rem}}
</style>
</head>
<body>

<div class="left">
  <div class="left-content">
    <div class="brand-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#d4a017" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L4 7v5c0 5 3.5 9.74 8 11 4.5-1.26 8-6 8-11V7L12 2z"/>
      </svg>
      EL PADRINO
    </div>
    <div class="brand-tagline">Sorteos Digitales · Est. 2026</div>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line r"></div>
    </div>
    <p class="left-quote">"La suerte favorece<br>a los que se preparan."</p>
    <p class="left-quote-author">— La Familia</p>
  </div>
</div>

<div class="right">
  <div class="form-header">
    <div class="form-tag">Bienvenido de vuelta</div>
    <div class="form-title">Iniciar sesión</div>
  </div>
  <form id="loginForm" novalidate>
    <div class="field">
      <label for="identifier">Usuario o correo</label>
      <input type="text" id="identifier" placeholder="tu_usuario o correo@ejemplo.com" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="toggle-pw" aria-label="Mostrar contraseña">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="btnSubmit">Entrar</button>
  </form>
  <p class="form-footer">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
</div>

<script type="module">
import { supabase } from "../assets/js/supabase.js";

const showErr = (title, text) =>
  Swal.fire({ icon:"error", title, text, confirmButtonColor:"#8b1a1a" });

document.querySelector(".toggle-pw").addEventListener("click", () => {
  const inp  = document.getElementById("password");
  const icon = document.querySelector(".toggle-pw i");
  inp.type   = inp.type === "password" ? "text" : "password";
  icon.classList.toggle("bi-eye");
  icon.classList.toggle("bi-eye-slash");
});

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const identifier = document.getElementById("identifier").value.trim();
  const password   = document.getElementById("password").value;
  const btn        = document.getElementById("btnSubmit");

  if (!identifier || !password) { showErr("Campos vacíos","Completa todos los campos."); return; }

  btn.disabled = true;
  btn.textContent = "Verificando…";

  try {
    let email = identifier;

    /* ─── Si es username → resolver email via RPC SECURITY DEFINER ───
       Esta función corre con privilegios elevados, evita RLS            */
    if (!identifier.includes("@")) {
      const { data: resolvedEmail, error: rpcErr } = await supabase
        .rpc("get_email_by_username", { p_username: identifier.toLowerCase() });

      if (rpcErr || !resolvedEmail) {
        showErr("No encontrado", "Usuario no encontrado. Intenta con tu correo electrónico.");
        return;
      }
      email = resolvedEmail;
    }

    /* ─── Autenticar ─── */
    const { data: authData, error: authErr } =
      await supabase.auth.signInWithPassword({ email, password });

    if (authErr) {
      if (authErr.message.includes("Email not confirmed")) {
        Swal.fire({ icon:"warning", title:"Confirma tu correo",
          text:"Revisa tu bandeja de entrada y confirma tu cuenta antes de ingresar.",
          confirmButtonColor:"#8b1a1a" });
      } else {
        showErr("Credenciales incorrectas","Usuario o contraseña incorrectos.");
      }
      return;
    }

    if (!authData.user.email_confirmed_at) {
      await supabase.auth.signOut();
      Swal.fire({ icon:"warning", title:"Confirma tu correo",
        text:"Debes confirmar tu correo antes de ingresar.", confirmButtonColor:"#8b1a1a" });
      return;
    }

    /* ─── Perfil (ya autenticado, RLS permite leer) ─── */
    const { data: profile } = await supabase
      .from("profiles")
      .select("rol, estado")
      .eq("id", authData.user.id)
      .single();

    if (!profile) {
      window.location.href = "../public/usuario/index.html"; return;
    }

    if (profile.estado !== "activo") {
      await supabase.auth.signOut();
      showErr("Cuenta suspendida","Tu cuenta está suspendida. Contacta al administrador."); return;
    }

    const rutas = {
      admin:      "../public/admin/index.html",
      trabajador: "../public/trabajador/index.html",
      usuario:    "../public/usuario/index.html",
    };
    window.location.href = rutas[profile.rol] ?? rutas.usuario;

  } catch (err) {
    console.error("Login error:", err);
    showErr("Error inesperado","Intenta de nuevo más tarde.");
  } finally {
    btn.disabled    = false;
    btn.textContent = "Entrar";
  }
});
</script>
</body>
</html>
