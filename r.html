<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cofre CordyCafe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌑 FONDO */
body{
  background: radial-gradient(circle,#020617,#000);
  font-family: 'Segoe UI', sans-serif;
  color:white;
  text-align:center;
}

/* 🎁 BOTÓN COFRE */
.btn-cofre{
  margin-top:50px;
  padding:15px 30px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#facc15,#f59e0b);
  color:#000;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 0 20px rgba(255,200,0,0.5);
}

/* 🎴 CONTENEDOR CARTAS */
.cards{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:40px;
}

/* 🃏 CARTA */
.card{
  width:140px;
  height:200px;
  perspective:1000px;
}

/* CARA INTERNA */
.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.8s;
}

/* GIRAR */
.card.flip .card-inner{
  transform:rotateY(180deg);
}

/* CARAS */
.card-front, .card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:16px;
  backface-visibility:hidden;
}

/* PARTE TRASERA */
.card-front{
  background:#1e293b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

/* PARTE DELANTERA */
.card-back{
  transform:rotateY(180deg);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:10px;
}

/* 🎮 RAREZAS */
.comun{ background:linear-gradient(#3b82f6,#1e3a8a); }
.rara{ background:linear-gradient(#22c55e,#14532d); }
.epica{ background:linear-gradient(#a855f7,#4c1d95); }
.legendaria{ background:linear-gradient(#facc15,#b45309); color:#000; }

/* IMG */
.card-back img{
  height:80px;
  object-fit:contain;
  margin:auto;
}

/* TEXTO */
.card-back h6{
  font-size:13px;
}

.card-back span{
  font-size:11px;
}

/* ✨ BRILLO LEGENDARIA */
.legendaria::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  left:-100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shine 2s infinite;
}

@keyframes shine{
  0%{left:-100%;}
  100%{left:100%;}
}

/* 🎬 ANIMACIÓN APARECER */
@keyframes aparecer{
  from{transform:translateY(50px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.card{
  animation:aparecer 0.5s ease forwards;
}

</style>
</head>

<body>

<h2>🎁 Abrir Cofre</h2>

<button class="btn-cofre" onclick="abrirCofre()">Abrir Cofre</button>

<div class="cards" id="cards"></div>

<script>

const data = [
  {
    nombre:"Cappuccino",
    rareza:"comun",
    img:"https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195044_Gallery-removebg-preview_tmnzwa.png"
  },
  {
    nombre:"Frappé",
    rareza:"rara",
    img:"https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_194954_Gallery-removebg-preview_semx2y.png"
  },
  {
    nombre:"Frappuccino",
    rareza:"epica",
    img:"https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195106_Gallery-removebg-preview_axyszp.png"
  },
  {
    nombre:"CordyLatte",
    rareza:"legendaria",
    img:"https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195017_Gallery-removebg-preview_mrtog8.png"
  }
];

function abrirCofre(){
  const container = document.getElementById("cards");
  container.innerHTML = "";

  data.forEach((item,i)=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">❓</div>
        <div class="card-back ${item.rareza}">
          <img src="${item.img}">
          <h6>${item.nombre}</h6>
          <span>${item.rareza}</span>
        </div>
      </div>
    `;

    container.appendChild(card);

    // flip con delay
    setTimeout(()=>{
      card.classList.add("flip");
    }, 600 * i);

  });
}

</script>

</body>
</html>
