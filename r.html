<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cartas CordyCafe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  background:#020617;
  font-family:'Segoe UI',sans-serif;
}

/* GRID */
.container{
  max-width:900px;
}

/* CARD */
.card-game{
  background:#020617;
  border-radius:16px;
  padding:12px;
  height:260px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  transition:0.25s;
  border:1px solid rgba(255,255,255,0.05);
}

/* HOVER SUAVE */
.card-game:hover{
  transform:translateY(-4px);
}

/* IMG */
.card-game img{
  height:90px;
  object-fit:contain;
  margin:auto;
}

/* NOMBRE */
.card-game h6{
  color:#f1f5f9;
  font-size:14px;
  margin:5px 0;
}

/* BADGE */
.badge{
  font-size:11px;
}

/* FOOTER */
.card-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:5px;
}

/* BOTÓN */
.btn-buy{
  font-size:11px;
  padding:4px 8px;
}

/* RAREZAS */
.comun{ border-top:3px solid #3b82f6; }
.rara{ border-top:3px solid #22c55e; }
.epica{ border-top:3px solid #a855f7; }
.legendaria{ border-top:3px solid #facc15; }

/* BADGE COLORES */
.bg-comun{ background:#3b82f6; }
.bg-rara{ background:#22c55e; }
.bg-epica{ background:#a855f7; }
.bg-legendaria{ background:#facc15; color:#000; }

</style>
</head>

<body>

<div class="container py-4">
  <div class="row g-3">

    <!-- CARD -->
    <div class="col-3">
      <div class="card-game comun">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195044_Gallery-removebg-preview_tmnzwa.png">
        
        <h6>Cappuccino</h6>

        <span class="badge bg-comun">Común</span>

        <div class="card-footer">
          <small style="color:#94a3b8;">+ Energía</small>
          <button class="btn btn-light btn-buy">Bs 10</button>
        </div>
      </div>
    </div>

    <!-- CARD -->
    <div class="col-3">
      <div class="card-game rara">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_194954_Gallery-removebg-preview_semx2y.png">
        
        <h6>Frappé Caramelo</h6>

        <span class="badge bg-rara">Rara</span>

        <div class="card-footer">
          <small style="color:#94a3b8;">+ Energía + Sabor</small>
          <button class="btn btn-light btn-buy">Bs 15</button>
        </div>
      </div>
    </div>

    <!-- CARD -->
    <div class="col-3">
      <div class="card-game epica">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195106_Gallery-removebg-preview_axyszp.png">
        
        <h6>Frappuccino</h6>

        <span class="badge bg-epica">Épica</span>

        <div class="card-footer">
          <small style="color:#94a3b8;">+ Energía + Enfoque</small>
          <button class="btn btn-light btn-buy">Bs 20</button>
        </div>
      </div>
    </div>

    <!-- CARD -->
    <div class="col-3">
      <div class="card-game legendaria">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195017_Gallery-removebg-preview_mrtog8.png">
        
        <h6>CordyLatte</h6>

        <span class="badge bg-legendaria">Legendaria</span>

        <div class="card-footer">
          <small style="color:#94a3b8;">+ Energía PRO</small>
          <button class="btn btn-warning btn-buy">Bs 25</button>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
