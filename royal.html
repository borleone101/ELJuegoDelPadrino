<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cartas CordyCafe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
  background: linear-gradient(180deg,#0f172a,#020617);
  font-family: 'Segoe UI', sans-serif;
}

.cards-container{
  padding:40px 10px;
}

.card-game{
  border-radius:18px;
  padding:15px;
  text-align:center;
  color:#fff;
  height:240px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.card-game img{
  height:110px;
  object-fit:contain;
  margin:auto;
}

.card-game h5{
  font-size:15px;
  margin:5px 0;
  font-weight:600;
}

.card-game span{
  font-size:13px;
  opacity:0.9;
}

.comun{
  background:linear-gradient(180deg,#3b82f6,#1e3a8a);
}

.rara{
  background:linear-gradient(180deg,#22c55e,#14532d);
}

.epica{
  background:linear-gradient(180deg,#a855f7,#4c1d95);
}

.legendaria{
  background:linear-gradient(180deg,#facc15,#b45309);
  color:#3b2f00;
}

.card-game:hover{
  transform:translateY(-8px) scale(1.05);
}

.legendaria::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{ left:-100%; }
  100%{ left:100%; }
}

</style>
</head>

<body>

<div class="container cards-container">
  <div class="row g-4 justify-content-center">

    <!-- COMÚN -->
    <div class="col-6 col-md-3">
      <div class="card-game comun">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195044_Gallery-removebg-preview_tmnzwa.png">
        <h5>Cappuccino</h5>
        <span>💧 Común</span>
      </div>
    </div>

    <!-- RARA -->
    <div class="col-6 col-md-3">
      <div class="card-game rara">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_194954_Gallery-removebg-preview_semx2y.png">
        <h5>Frappé Caramelo</h5>
        <span>⭐ Rara</span>
      </div>
    </div>

    <!-- ÉPICA -->
    <div class="col-6 col-md-3">
      <div class="card-game epica">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195106_Gallery-removebg-preview_axyszp.png">
        <h5>Frappuccino</h5>
        <span>✨ Épica</span>
      </div>
    </div>

    <!-- LEGENDARIA -->
    <div class="col-6 col-md-3">
      <div class="card-game legendaria">
        <img src="https://res.cloudinary.com/dkz78oljz/image/upload/v1776306500/Screenshot_20260415_195017_Gallery-removebg-preview_mrtog8.png">
        <h5>CordyLatte</h5>
        <span>🔥 Legendaria</span>
      </div>
    </div>

  </div>
</div>

<script>
document.querySelectorAll(".card-game").forEach(card=>{
  card.addEventListener("click",()=>{
    alert("Seleccionaste: " + card.querySelector("h5").innerText);
  });
});
</script>

</body>
</html>
