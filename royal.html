<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cartas de Recetas</title>

<style>
body{
  margin:0;
  background:#f1f5f9;
  font-family: 'Segoe UI', sans-serif;
}

/* CONTENEDOR */
.cards{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:40px;
}

/* TARJETA */
.card{
  width:160px;
  border-radius:16px;
  padding:15px;
  text-align:center;
  color:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
  transition:0.3s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* IMAGEN */
.card img{
  width:100%;
  height:120px;
  object-fit:contain;
  margin-bottom:10px;
}

/* TEXTO */
.card h3{
  margin:5px 0;
  font-size:16px;
}

.card span{
  font-size:14px;
  opacity:0.9;
}

/* 🎮 COLORES POR RAREZA */

.comun{
  background:linear-gradient(180deg,#60a5fa,#2563eb);
}

.rara{
  background:linear-gradient(180deg,#4ade80,#16a34a);
}

.epica{
  background:linear-gradient(180deg,#c084fc,#7e22ce);
}

.legendaria{
  background:linear-gradient(180deg,#fde047,#f59e0b);
  color:#5a3b00;
}

/* ✨ EFECTO HOVER */
.card:hover{
  transform:translateY(-6px) scale(1.05);
}

/* 🌟 BRILLO SUAVE PARA LEGENDARIA */
.legendaria::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{ left:-100%; }
  100%{ left:100%; }
}

</style>
</head>

<body>

<div class="cards">

  <!-- COMÚN -->
  <div class="card comun">
    <img src="img/cappuccino.png" alt="">
    <h3>Cappuccino</h3>
    <span>💧 Común</span>
  </div>

  <!-- RARA -->
  <div class="card rara">
    <img src="img/frappe.png" alt="">
    <h3>Frappé Caramelo</h3>
    <span>⭐ Rara</span>
  </div>

  <!-- ÉPICA -->
  <div class="card epica">
    <img src="img/frappuccino.png" alt="">
    <h3>Frappuccino</h3>
    <span>✨ Épica</span>
  </div>

  <!-- LEGENDARIA -->
  <div class="card legendaria">
    <img src="img/cordylatte.png" alt="">
    <h3>CordyLatte</h3>
    <span>🔥 Legendaria</span>
  </div>

</div>

<script>

/* CLICK SIMPLE */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click",()=>{
    alert("Seleccionaste: " + card.querySelector("h3").innerText);
  });
});

</script>

</body>
</html>
